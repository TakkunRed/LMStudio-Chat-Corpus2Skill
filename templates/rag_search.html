<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpus2Skill — RAG 検索テスト</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d14;
            color: #ccc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── ヘッダー ── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: #13131f;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        header h1 { font-size: 16px; font-weight: 600; color: #e2e2ff; flex: 1; }
        .btn-back {
            background: #1e1e2e; border: 1px solid #333; color: #aaa;
            padding: 5px 12px; border-radius: 6px; cursor: pointer;
            font-size: 12px; text-decoration: none; transition: background .15s;
        }
        .btn-back:hover { background: #2a2a3e; color: #fff; }

        /* ── 検索バー ── */
        .search-bar {
            padding: 14px 20px;
            background: #10101a;
            border-bottom: 1px solid #1a1a2a;
            flex-shrink: 0;
        }
        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            background: #1a1a2a;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 16px;
            color: #ddd;
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }
        .search-input:focus { border-color: #6366f1; }
        .search-btn {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 10px 22px;
            font-size: 14px;
            cursor: pointer;
            transition: background .15s;
            white-space: nowrap;
        }
        .search-btn:hover { background: #6366f1; }
        .search-btn:disabled { background: #2a2a40; color: #666; cursor: not-allowed; }
        .search-meta {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .top-k-label { color: #666; }
        .top-k-select {
            background: #1a1a2a;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            color: #aaa;
            padding: 2px 8px;
            font-size: 12px;
            outline: none;
        }

        /* ── メインレイアウト ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── 結果リスト ── */
        .results-panel {
            width: 380px;
            min-width: 280px;
            background: #10101a;
            border-right: 1px solid #1e1e2e;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 12px 0;
        }
        .results-empty {
            padding: 40px 20px;
            text-align: center;
            color: #444;
            font-size: 13px;
        }
        .results-empty .icon { font-size: 32px; margin-bottom: 10px; }

        .result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #141420;
            cursor: pointer;
            transition: background .12s;
        }
        .result-item:hover { background: #14141e; }
        .result-item.selected { background: #1a1a30; border-left: 3px solid #6366f1; padding-left: 13px; }

        .result-rank {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .result-rank-num {
            font-size: 10px;
            background: #1e1e40;
            color: #6366f1;
            border-radius: 10px;
            padding: 1px 8px;
        }
        .result-score {
            font-size: 11px;
            color: #555;
        }
        .score-bar {
            height: 3px;
            background: #1a1a2a;
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            border-radius: 2px;
            transition: width .3s;
        }
        .result-doc {
            font-size: 10px;
            color: #6366f1;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-preview {
            font-size: 12px;
            color: #777;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── 詳細パネル ── */
        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            background: #0d0d14;
        }
        .detail-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: #333;
        }
        .detail-placeholder .icon { font-size: 48px; }

        .detail-section {
            background: #13131f;
            border: 1px solid #1e1e2e;
            border-radius: 10px;
            padding: 20px 22px;
            margin-bottom: 16px;
        }
        .detail-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 12px;
        }
        .detail-meta-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .detail-tag {
            font-size: 11px;
            background: #1a1a2a;
            border: 1px solid #2a2a40;
            border-radius: 4px;
            padding: 3px 10px;
            color: #818cf8;
        }
        .detail-score-large {
            font-size: 28px;
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 4px;
        }
        .detail-score-label { font-size: 12px; color: #555; }

        .chunk-text-box {
            background: #0b0b14;
            border: 1px solid #1a1a2a;
            border-radius: 8px;
            padding: 18px 20px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── ローディング ── */
        .loading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
            justify-content: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #222;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        /* ── スクロールバー ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a5e; }
    </style>
</head>
<body>

<!-- ヘッダー -->
<header>
    <a href="/" class="btn-back">← チャットに戻る</a>
    <h1>🔍 Corpus2Skill — RAG 検索テスト</h1>
</header>

<!-- 検索バー -->
<div class="search-bar">
    <div class="search-row">
        <input type="text" id="queryInput" class="search-input"
               placeholder="検索クエリを入力してください..."
               onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" id="searchBtn" onclick="doSearch()">🔍 検索</button>
    </div>
    <div class="search-meta">
        <span class="top-k-label">表示件数:</span>
        <select class="top-k-select" id="topKSelect">
            <option value="5">5件</option>
            <option value="10" selected>10件</option>
            <option value="20">20件</option>
        </select>
        <span id="searchInfo"></span>
    </div>
</div>

<!-- メインレイアウト -->
<div class="main">
    <!-- 結果リスト -->
    <div class="results-panel" id="resultsPanel">
        <div class="results-empty">
            <div class="icon">🔍</div>
            <p>クエリを入力して検索してください</p>
        </div>
    </div>

    <!-- 詳細パネル -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-placeholder" id="detailPlaceholder">
            <div class="icon">📄</div>
            <p>左のリストからチャンクを選択してください</p>
        </div>
        <div id="detailContent" style="display:none;"></div>
    </div>
</div>

<script>
    let allChunks = [];
    let selectedIdx = -1;

    // ── 検索実行 ────────────────────────────────────────────────────
    async function doSearch() {
        const query = document.getElementById('queryInput').value.trim();
        if (!query) { document.getElementById('queryInput').focus(); return; }

        const topK  = parseInt(document.getElementById('topKSelect').value);
        const panel = document.getElementById('resultsPanel');
        const btn   = document.getElementById('searchBtn');
        const info  = document.getElementById('searchInfo');

        panel.innerHTML = '<div class="loading-row"><div class="spinner"></div>検索中...</div>';
        btn.disabled = true;
        info.textContent = '';
        allChunks = [];
        selectedIdx = -1;
        showDetailPlaceholder();

        const start = Date.now();
        try {
            const res  = await fetch('/api/rag/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, detail: true, top_k: topK }),
            });
            const data = await res.json();

            if (data.error) {
                panel.innerHTML = `<div class="results-empty"><div class="icon">⚠️</div><p>${esc(data.error)}</p></div>`;
                return;
            }

            allChunks = data.chunks || [];
            const elapsed = ((Date.now() - start) / 1000).toFixed(2);
            info.textContent = `${allChunks.length} 件 / ${elapsed}s`;

            renderResults();
        } catch (e) {
            panel.innerHTML = `<div class="results-empty"><div class="icon">⚠️</div><p>エラー: ${esc(e.message)}</p></div>`;
        } finally {
            btn.disabled = false;
        }
    }

    // ── 結果リスト描画 ───────────────────────────────────────────────
    function renderResults() {
        const panel = document.getElementById('resultsPanel');
        if (allChunks.length === 0) {
            panel.innerHTML = '<div class="results-empty"><div class="icon">😶</div><p>一致するチャンクが見つかりませんでした</p></div>';
            return;
        }

        const maxScore = allChunks[0]?.score || 1;
        panel.innerHTML = allChunks.map((c, i) => {
            const barWidth = Math.round((c.score / maxScore) * 100);
            const preview  = (c.text || '').replace(/\n/g, ' ').substring(0, 100);
            const docShort = c.doc_id.length > 36 ? c.doc_id.substring(0, 33) + '…' : c.doc_id;
            return `
            <div class="result-item" id="result-${i}" onclick="selectChunk(${i})">
                <div class="result-rank">
                    <span class="result-rank-num">#${i + 1}</span>
                    <span class="result-score">スコア: ${c.score.toFixed(4)}</span>
                </div>
                <div class="score-bar"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
                <div class="result-doc" title="${esc(c.doc_id)}">${esc(docShort)} #${c.chunk_idx}</div>
                <div class="result-preview">${esc(preview)}…</div>
            </div>`;
        }).join('');
    }

    // ── チャンク選択 ─────────────────────────────────────────────────
    function selectChunk(idx) {
        if (selectedIdx >= 0) {
            document.getElementById(`result-${selectedIdx}`)?.classList.remove('selected');
        }
        selectedIdx = idx;
        document.getElementById(`result-${idx}`)?.classList.add('selected');
        showChunkDetail(allChunks[idx], idx);
    }

    // ── 詳細パネル描画 ────────────────────────────────────────────────
    function showDetailPlaceholder() {
        document.getElementById('detailPlaceholder').style.display = 'flex';
        document.getElementById('detailContent').style.display = 'none';
    }

    function showChunkDetail(chunk, idx) {
        document.getElementById('detailPlaceholder').style.display = 'none';
        const dc = document.getElementById('detailContent');
        dc.style.display = 'block';

        // スコアバーの幅（最高スコアを 100% として）
        const maxScore  = allChunks[0]?.score || 1;
        const barWidth  = Math.round((chunk.score / maxScore) * 100);
        const charCount = (chunk.text || '').length;

        dc.innerHTML = `
            <div class="detail-section">
                <div class="detail-section-title">📄 チャンク情報 — ランク #${idx + 1}</div>
                <div class="detail-meta-row">
                    <span class="detail-tag">📁 ${esc(chunk.doc_id)}</span>
                    <span class="detail-tag">チャンク #${chunk.chunk_idx}</span>
                    <span class="detail-tag">${charCount} 文字</span>
                </div>
                <div class="detail-score-large">${chunk.score.toFixed(4)}</div>
                <div class="detail-score-label">コサイン類似度スコア</div>
                <div class="score-bar" style="margin-top:10px;">
                    <div class="score-bar-fill" style="width:${barWidth}%"></div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">📝 チャンクテキスト</div>
                <div class="chunk-text-box">${esc(chunk.text || '（テキストなし）')}</div>
            </div>`;
    }

    // ── ユーティリティ ────────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 初期フォーカス
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('queryInput').focus();
    });
</script>
</body>
</html>
